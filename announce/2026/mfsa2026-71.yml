## mfsa2026-71.yml
announced: July 21, 2026
impact: high
fixed_in:
- Thunderbird 153
title: Security Vulnerabilities fixed in Thunderbird 153
description: |
  *In general, these flaws cannot be exploited through email in the Thunderbird product because scripting is disabled when reading mail, but are potentially risks in browser or browser-like contexts.*
advisories:
  CVE-2026-14899:
    title: Off-by-one out of bounds read in MIME header parser for forwarding
    impact: moderate
    reporter: Claude, Kai Engert
    bugs:
      - url: 2046137
    description: |
      The code to parse MIME headers for display when forwarding a message (if the setting to view all headers was enabled) had an off-by-one error, allowing a single byte to be read from the memory after the buffer for the headers, and potentially crashing Thunderbird.
